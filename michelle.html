<!DOCTYPE html>
<html>
    <head>
        <title> Main Page</title>
    <style media="screen">
       *,
*::before,
*::after{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
body{
    background: url(bkg.jpg) no-repeat;
    background-size: cover;
}
.background{
    width: 430px;
    height: 520px;
    position: absolute;
    transform: translate(-50%,-50%);
    left: 50%;
    top: 50%;
}
.background .shape{
    height: 50%;
    width: 50%;
    position: absolute;
    border-radius: 100%;

}
.shape:first-child{
    background: linear-gradient(
        #1845ad,
        #23a2f6
    );
    left: -98px;
    top: -50px;
}
.shape:last-child{
    background: linear-gradient(
        to right,
        #ff512f,
        #f09819
    );
     right: -98px;
     bottom: -50px;
}
form{
    height: 520px;
    width: 400px;
    background-color: rgba(255,255,255,0.13);
    position: absolute;
    transform: translate(-50%,-50%);
    top: 50%;
    left: 50%;
    border-radius: 10%;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(8,7,16,0.6);
    padding: 50px 30px;

}
form h3{
    font-size: 32px;
    font-weight: 500;
    line-height: 42px;
    text-align: center;
}
label{
    display: block;
    margin-top: 30px;
    font-size: 16px;
    font-weight: 500;
}

input{
    display: block;
    height: 50px;
    width: 100%;
    background-color: rgba(255,255,255,0.07);
    border-radius: 3px;
    padding: 0 10px;
    margin-top: 8px;
    font-size: 14px;
    font-weight: 300;
}
::placeholder{
    color: #e5e5e5;
}
button{
    margin-top: 50px;
    width: 100%;
    background-color: #fffff;
    color: #080710;
    padding: 15px 0;
    font-size: 18px;
    font-weight: 600;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>
<body>
<div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
     <form id="loginForm" action="subjectss2.html">
           <h3>CBT Login Form</h3>
           <label for="username">Username</label>
           <input type="text" id="username" name="username" placeholder="Username">
           <label for="password">Password</label>
           <input type="password" id="password" name="password" placeholder="Password">
           <button id="loginBtn" disabled="disabled">Login</button>
     </form>

 <script>
    console.log(loginForm.addEventListener('input', () => {
        if (username.value == "Michy01" &&
           password.value == 2005) {
           window.alert('Please Click login Button To Proceed');
           loginBtn.removeAttribute('disabled');
       } else {
           loginBtn.setAttribute('disabled', 'disabled');
       }

 }));

</script>
       
     </body>
</html>
